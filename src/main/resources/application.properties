spring.application.name=MiniInventario
server.port=${PORT:8085}

# DB PostgreSQL (Render inyecta SPRING_DATASOURCE_URL en formato postgres://)
# startup.sh lo convierte a jdbc:postgresql:// antes de arrancar
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/InventarioMini4BM2}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/documentacion/swagger-ui.html
springdoc.paths-to-match=/api/v1/categorias/**, /api/v1/productos/**