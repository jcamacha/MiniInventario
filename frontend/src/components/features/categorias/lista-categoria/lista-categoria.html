<div class="mb-3">
  <div class="container">
    <div class="card border-succes text-center">
      <div class="card-header">
        <h2 class="card-title">
          {{ titulo }}
        </h2>
      </div>
      <div class="card-body">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>idCategoria</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Fecha de Creación</th>
              <th colspan="2">Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (lc of (listaCategorias()); track lc.idCategoria) {
              <tr>
                <td>{{ lc.idCategoria }}</td>
                <td>{{ lc.nombreCategoria }}</td>
                <td>{{ lc.descripcionCategoria }}</td>
                <td>{{ lc.createAt}}</td>
                <td>
                  <button class="btn btn-outline-success" (click)="irAForm(lc)">Actualizar</button>
                </td>
                <td>
                  <button class="btn btn-danger" (click)="eliminar(lc)">Eliminar</button>
                </td>
              </tr>
            } @empty{
              <tr>
                <td colspan="6">No hay categorías disponibles.</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
