<div class="container mt-4">
  <div class="text-center mb-4">
    <h3 class="fw-light">Panel de Inventario</h3>
    <p class="text-secondary">Gestiona tus categorías y productos</p>
  </div>

  <div class="row g-4 justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm h-100">
        <div class="card-body text-center py-4">
          <div class="display-6 mb-2">📂</div>
          <h5 class="card-title">Categorías</h5>
          <p class="card-text text-secondary">Organiza tus productos por categorías</p>
          <div class="d-flex gap-2 justify-content-center">
            <a routerLink="/ListaCategorias" class="btn btn-outline-dark btn-sm">Ver todas</a>
            <a routerLink="/CategoriaForm" class="btn btn-dark btn-sm">+ Nueva</a>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card shadow-sm h-100">
        <div class="card-body text-center py-4">
          <div class="display-6 mb-2">📦</div>
          <h5 class="card-title">Productos</h5>
          <p class="card-text text-secondary">Administra tu inventario de productos</p>
          <div class="d-flex gap-2 justify-content-center">
            <a routerLink="/ListaProductos" class="btn btn-outline-dark btn-sm">Ver todos</a>
            <a routerLink="/ProductoForm" class="btn btn-dark btn-sm">+ Nuevo</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
